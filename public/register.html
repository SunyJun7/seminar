<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>참석 신청 | AI 기반 실시간 데이터 플랫폼 세미나</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="form-card">
      <h2>참석 신청</h2>
      <p class="subtitle">아래 정보를 입력하시면 신청이 완료됩니다. <span style="color:#e53935;">*</span> 표시는 필수 항목입니다.</p>

      <form id="registerForm" novalidate>

        <div class="form-group">
          <label for="name">이름 <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="홍길동" />
        </div>

        <div class="form-group">
          <label for="company">회사명 <span class="required">*</span></label>
          <input type="text" id="company" name="company" placeholder="(주)스마트게이트" />
        </div>

        <div class="form-group">
          <label for="position">직책 <span class="required">*</span></label>
          <input type="text" id="position" name="position" placeholder="팀장" />
        </div>

        <div class="form-group">
          <label for="phone">연락처 <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" />
        </div>

        <div class="form-group">
          <label for="email">이메일 <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="example@company.com" />
        </div>

        <div class="form-group">
          <label>관심 분야 <span style="font-weight:400; color:#888; font-size:12px;">(선택)</span></label>
          <div class="interest-grid">
            <label><input type="checkbox" name="interest" value="AI" /> AI</label>
            <label><input type="checkbox" name="interest" value="실시간데이터" /> 실시간 데이터</label>
            <label><input type="checkbox" name="interest" value="IoT" /> IoT</label>
            <label><input type="checkbox" name="interest" value="플랫폼" /> 플랫폼</label>
          </div>
        </div>

        <div class="form-group">
          <label>개인정보 수집 및 이용 동의 <span class="required">*</span></label>
          <div class="privacy-box">
            수집 항목: 이름, 회사명, 직책, 연락처, 이메일<br>
            수집 목적: 세미나 참석 신청 및 행사 안내<br>
            보유 기간: 행사 종료 후 1개월
          </div>
          <label class="privacy-agree">
            <input type="checkbox" id="privacy_agree" name="privacy_agree" />
            개인정보 수집 및 이용에 동의합니다.
          </label>
        </div>

        <button type="button" class="btn-primary" onclick="submitForm()">신청하기</button>

      </form>
    </div>

    <div style="text-align:center; margin-top:16px;">
      <a href="index.html" style="color:#888; font-size:13px; text-decoration:none;">← 메인으로 돌아가기</a>
    </div>
  </div>

  <!-- 팝업 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <div class="modal-title">입력 확인</div>
      <div class="modal-msg" id="modalMsg"></div>
      <button class="btn-modal-ok" onclick="closeModal()">확인</button>
    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
