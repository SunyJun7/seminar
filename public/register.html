<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✏️ [수정] 브라우저 탭 제목 (| 뒤의 세미나 이름 변경) -->
  <title>참석 신청 | AI 기반 실시간 데이터 플랫폼 세미나</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="form-card">

      <!-- ✏️ [수정] 폼 상단 제목 -->
      <h2>참석 신청</h2>

      <!-- ✏️ [수정] 제목 아래 안내 문구 -->
      <p class="subtitle">아래 정보를 입력하시면 신청이 완료됩니다. <span style="color:#e53935;">*</span> 표시는 필수 항목입니다.</p>

      <!-- ⚠️ 아래 form 태그와 id는 수정하지 마세요 (검증 로직과 연결됨) -->
      <form id="registerForm" novalidate>

        <!-- ====================================================
             입력 필드
             - label 안의 텍스트 = 화면에 표시되는 항목명
             - placeholder = 입력칸 안 회색 예시 문구
             - ⚠️ id / name 값은 절대 수정하지 마세요 (검증 로직과 연결됨)
        ===================================================== -->

        <!-- 이름 -->
        <div class="form-group">
          <label for="name">이름 <span class="required">*</span></label>
          <!-- ✏️ [수정] placeholder = 입력칸 안 예시 문구 -->
          <input type="text" id="name" name="name" placeholder="홍길동" />
        </div>

        <!-- 회사명 -->
        <div class="form-group">
          <label for="company">회사명 <span class="required">*</span></label>
          <!-- ✏️ [수정] placeholder = 입력칸 안 예시 문구 -->
          <input type="text" id="company" name="company" placeholder="(주)스마트게이트" />
        </div>

        <!-- 직책 -->
        <div class="form-group">
          <label for="position">직책 <span class="required">*</span></label>
          <!-- ✏️ [수정] placeholder = 입력칸 안 예시 문구 -->
          <input type="text" id="position" name="position" placeholder="팀장" />
        </div>

        <!-- 연락처 -->
        <div class="form-group">
          <label for="phone">연락처 <span class="required">*</span></label>
          <!-- ✏️ [수정] placeholder = 입력칸 안 예시 문구 -->
          <input type="tel" id="phone" name="phone" placeholder="01000000000 또는 010-0000-0000" />
        </div>

        <!-- 이메일 -->
        <div class="form-group">
          <label for="email">이메일 <span class="required">*</span></label>
          <!-- ✏️ [수정] placeholder = 입력칸 안 예시 문구 -->
          <input type="email" id="email" name="email" placeholder="example@company.com" />
        </div>

        <!-- ====================================================
             관심 분야 (선택 항목, 체크박스)
             항목 추가/삭제: <label>...</label> 한 줄을 복사하거나 삭제
             ✏️ [수정] value="..." 와 표시 텍스트를 원하는 분야로 변경
        ===================================================== -->
        <div class="form-group">
          <label>관심 분야 <span style="font-weight:400; color:#888; font-size:12px;">(선택)</span></label>
          <div class="interest-grid">
            <label><input type="checkbox" name="interest" value="AI" /> AI</label>
            <label><input type="checkbox" name="interest" value="실시간데이터" /> 실시간 데이터</label>
            <label><input type="checkbox" name="interest" value="IoT" /> IoT</label>
            <label><input type="checkbox" name="interest" value="플랫폼" /> 플랫폼</label>
          </div>
        </div>

        <!-- ====================================================
             개인정보 수집 동의
             ✏️ [수정] 아래 privacy-box 안의 수집 항목/목적/보유기간 텍스트
        ===================================================== -->
        <div class="form-group">
          <label>개인정보 수집 및 이용 동의 <span class="required">*</span></label>
          <div class="privacy-box">
            <!-- ✏️ [수정] 개인정보 처리 방침 내용 -->
            수집 항목: 이름, 회사명, 직책, 연락처, 이메일<br>
            수집 목적: 세미나 참석 신청 및 행사 안내<br>
            보유 기간: 행사 종료 후 1개월
          </div>
          <!-- ✏️ [수정] 동의 체크박스 옆 문구 -->
          <label class="privacy-agree">
            <!-- ⚠️ id="privacy_agree" 는 수정하지 마세요 -->
            <input type="checkbox" id="privacy_agree" name="privacy_agree" />
            개인정보 수집 및 이용에 동의합니다.
          </label>
        </div>

        <!-- ✏️ [수정] 신청 버튼 텍스트 -->
        <!-- ⚠️ onclick="submitForm()" 은 수정하지 마세요 -->
        <button type="button" class="btn-primary" id="btnSubmit">신청하기</button>

      </form>
    </div>

    <!-- ✏️ [수정] 하단 메인 복귀 링크 텍스트 -->
    <div style="text-align:center; margin-top:16px;">
      <a href="index.html" style="color:#888; font-size:13px; text-decoration:none;">← 메인으로 돌아가기</a>
    </div>
  </div>

  <!-- ====================================================
       팝업 모달 (미입력 항목 알림창)
       ⚠️ 이 블록 전체는 수정하지 마세요 (자동으로 내용이 채워짐)
  ===================================================== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <div class="modal-title">입력 확인</div>
      <div class="modal-msg" id="modalMsg"></div>
      <button class="btn-modal-ok" id="btnModalOk">확인</button>
    </div>
  </div>

  <!-- ====================================================
       확인 팝업 (신청 전 입력 내용 최종 확인)
       ⚠️ 이 블록 전체는 수정하지 마세요 (자동으로 내용이 채워짐)
  ===================================================== -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal-box confirm-box">
      <div class="modal-icon">📋</div>
      <div class="modal-title">입력 정보 확인</div>
      <div class="modal-msg">아래 정보로 신청하시겠습니까?</div>
      <div class="confirm-table" id="confirmTable"></div>
      <div class="confirm-actions">
        <button class="btn-modal-edit" id="btnModalEdit">수정</button>
        <button class="btn-modal-ok" id="btnConfirmOk">확인</button>
      </div>
    </div>
  </div>

  <!-- ⚠️ 아래 스크립트는 수정하지 마세요 -->
  <script src="register.js"></script>
</body>
</html>
