<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 | 신청자 목록</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* 관리자 페이지 전용 스타일 */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .admin-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1a237e;
    }
    .admin-header .count {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }
    .btn-export {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1b5e20;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-export:hover { background: #2e7d32; }
    .btn-send {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-send:hover:not(:disabled) { background: #283593; }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-result {
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .send-result.success { background: #e8f5e9; color: #2e7d32; }
    .send-result.error   { background: #ffebee; color: #c62828; }

    /* 자료 업로드 섹션 */
    .upload-section {
      background: #f8f9ff;
      border: 1px solid #e0e3f0;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .upload-section h3 { font-size: 15px; font-weight: 700; color: #1a237e; margin-bottom: 14px; }
    .upload-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-upload {
      display: inline-flex; align-items: center; gap: 6px;
      background: #37474f; color: #fff; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-upload:hover:not(:disabled) { background: #455a64; }
    .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; }
    .file-list { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; border: 1px solid #e0e3f0; border-radius: 8px;
      padding: 9px 14px; font-size: 13px;
    }
    .file-item .file-name { color: #333; font-weight: 600; }
    .file-item .file-meta { color: #aaa; font-size: 12px; margin-left: 8px; }
    .btn-delete {
      background: none; border: none; color: #e53935; cursor: pointer;
      font-size: 13px; padding: 2px 6px; border-radius: 4px;
    }
    .btn-delete:hover { background: #ffebee; }
    .upload-msg { font-size: 13px; margin-top: 8px; }
    .upload-msg.success { color: #2e7d32; }
    .upload-msg.error   { color: #c62828; }

    /* 테이블 */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 14px;
    }
    thead tr {
      background: #1a237e;
      color: #fff;
    }
    thead th {
      padding: 12px 14px;
      text-align: left;
      white-space: nowrap;
      font-weight: 600;
    }
    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #f5f7ff; }
    tbody td {
      padding: 11px 14px;
      color: #333;
      vertical-align: middle;
    }
    tbody td.no { color: #aaa; font-size: 12px; }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 15px;
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 60px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container" style="max-width:1000px;">

    <!-- 세미나 자료 업로드 섹션 -->
    <div class="upload-section">
      <h3>📂 세미나 자료 관리</h3>
      <div class="upload-row">
        <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="uploadFile()">
        <button class="btn-upload" id="btnUpload" onclick="document.getElementById('fileInput').click()">
          ⬆️ PDF 업로드
        </button>
        <span style="font-size:13px;color:#888;">PDF 파일만 가능 · 최대 50MB</span>
      </div>
      <div id="uploadMsg" class="upload-msg"></div>
      <div id="fileList" class="file-list"></div>
    </div>

    <div class="admin-header">
      <div>
        <!-- ✏️ [수정] 관리자 페이지 제목 -->
        <h2>신청자 목록</h2>
        <div class="count" id="countText">불러오는 중...</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <!-- Excel 다운로드 버튼 - /api/export 로 연결됨 (수정 불필요) -->
        <a href="/api/export" class="btn-export">
          📥 Excel 다운로드
        </a>
        <!-- 감사 이메일 일괄 발송 -->
        <button class="btn-send" id="btnSendThanks" onclick="sendThanksEmail()">
          📧 감사 이메일 발송
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <!-- ✏️ [수정] 컬럼 헤더명 변경 가능 -->
            <th>No</th>
            <th>이름</th>
            <th>회사명</th>
            <th>직책</th>
            <th>연락처</th>
            <th>이메일</th>
            <th>관심분야</th>
            <th>신청일시</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="8" class="loading">데이터를 불러오는 중입니다...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="sendResult" class="send-result"></div>

    <div style="text-align:center; margin-top:20px;">
      <a href="index.html" style="color:#888; font-size:13px; text-decoration:none;">← 메인으로</a>
    </div>

  </div>

  <script>
    // 신청자 목록 불러오기
    async function loadRegistrations() {
      try {
        const res  = await fetch('/api/registrations');
        const data = await res.json();
        const tbody = document.getElementById('tableBody');
        const countEl = document.getElementById('countText');

        if (!Array.isArray(data) || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="empty-state">아직 신청자가 없습니다.</td></tr>`;
          countEl.textContent = '총 0명';
          return;
        }

        countEl.textContent = `총 ${data.length}명`;

        tbody.innerHTML = data.map((row, i) => `
          <tr>
            <td class="no">${i + 1}</td>
            <td>${escapeHtml(row.name)}</td>
            <td>${escapeHtml(row.company)}</td>
            <td>${escapeHtml(row.position)}</td>
            <td>${escapeHtml(row.phone)}</td>
            <td>${escapeHtml(row.email)}</td>
            <td>${escapeHtml(row.interest || '-')}</td>
            <td>${new Date(row.created_at).toLocaleString('ko-KR')}</td>
          </tr>
        `).join('');

      } catch {
        document.getElementById('tableBody').innerHTML =
          `<tr><td colspan="8" class="empty-state">데이터를 불러오지 못했습니다.<br>서버 연결을 확인해 주세요.</td></tr>`;
      }
    }

    // XSS 방지: 특수문자 이스케이프
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadRegistrations();
    loadFiles();

    // 업로드된 파일 목록 불러오기
    async function loadFiles() {
      try {
        const res  = await fetch('/api/files');
        const list = await res.json();
        const el   = document.getElementById('fileList');

        if (!Array.isArray(list) || list.length === 0) {
          el.innerHTML = '<span style="font-size:13px;color:#aaa;">업로드된 파일이 없습니다.</span>';
          return;
        }

        el.innerHTML = list.map(f => `
          <div class="file-item">
            <span>
              <span class="file-name">📄 ${escapeHtml(f.filename)}</span>
              <span class="file-meta">${(f.size / 1024).toFixed(0)} KB</span>
            </span>
            <button class="btn-delete" onclick="deleteFile('${escapeHtml(f.filename)}')">삭제</button>
          </div>
        `).join('');
      } catch {
        document.getElementById('fileList').innerHTML =
          '<span style="font-size:13px;color:#c62828;">파일 목록을 불러오지 못했습니다.</span>';
      }
    }

    // 파일 업로드
    async function uploadFile() {
      const input = document.getElementById('fileInput');
      const file  = input.files[0];
      if (!file) return;

      const btn = document.getElementById('btnUpload');
      const msg = document.getElementById('uploadMsg');
      btn.disabled = true;
      msg.textContent = '업로드 중...';
      msg.className   = 'upload-msg';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res  = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok && data.success) {
          msg.className   = 'upload-msg success';
          msg.textContent = `업로드 완료: ${data.filename}`;
          await loadFiles();
        } else {
          msg.className   = 'upload-msg error';
          msg.textContent = `오류: ${data.message}`;
        }
      } catch {
        msg.className   = 'upload-msg error';
        msg.textContent = '업로드 중 오류가 발생했습니다.';
      }

      btn.disabled  = false;
      input.value   = '';
    }

    // 파일 삭제
    async function deleteFile(filename) {
      if (!confirm(`"${filename}" 파일을 삭제하시겠습니까?`)) return;

      try {
        const res = await fetch(`/api/files/${encodeURIComponent(filename)}`, { method: 'DELETE' });
        if (res.ok) {
          await loadFiles();
        } else {
          alert('파일 삭제에 실패했습니다.');
        }
      } catch {
        alert('오류가 발생했습니다.');
      }
    }

    // 감사 이메일 일괄 발송
    async function sendThanksEmail() {
      const countText = document.getElementById('countText').textContent;
      const confirmed = confirm(`${countText}에게 감사 이메일을 발송합니다.\n계속하시겠습니까?`);
      if (!confirmed) return;

      const btn    = document.getElementById('btnSendThanks');
      const result = document.getElementById('sendResult');
      btn.disabled    = true;
      btn.textContent = '발송 중...';
      result.style.display = 'none';

      try {
        const res  = await fetch('/api/send-thanks', { method: 'POST' });
        const data = await res.json();

        if (res.ok && data.success) {
          result.className     = 'send-result success';
          result.textContent   = `발송 완료 — 성공: ${data.sent}건, 실패: ${data.failed}건`;
        } else {
          result.className     = 'send-result error';
          result.textContent   = `오류: ${data.message || '이메일 발송에 실패했습니다.'}`;
        }
      } catch {
        result.className   = 'send-result error';
        result.textContent = '서버 연결 오류가 발생했습니다.';
      }

      result.style.display = 'block';
      btn.disabled    = false;
      btn.textContent = '📧 감사 이메일 발송';
    }
  </script>
</body>
</html>
