<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세미나 후기 | SmartGate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="form-card">
      <h2>참석자 정보 입력</h2>
      <p class="subtitle">아래 정보를 입력하시면 설문이 완료됩니다. <span style="color:#e53935;">*</span> 표시는 필수 항목입니다.</p>

      <div class="form-group">
        <label for="reviewName">이름 <span class="required">*</span></label>
        <input type="text" id="reviewName" placeholder="홍길동" />
      </div>
      <div class="form-group">
        <label for="reviewCompany">회사명 <span class="required">*</span></label>
        <input type="text" id="reviewCompany" placeholder="(주)스마트게이트" />
      </div>
      <div class="form-group">
        <label for="reviewDept">부서 <span class="required">*</span></label>
        <input type="text" id="reviewDept" placeholder="전략기획팀" />
      </div>
      <div class="form-group">
        <label for="reviewPhone">연락처 <span class="required">*</span></label>
        <input type="tel" id="reviewPhone" placeholder="01012345678" />
      </div>
      <div class="form-group">
        <label for="reviewEmail">이메일 <span class="required">*</span></label>
        <input type="email" id="reviewEmail" placeholder="example@company.com" />
      </div>

      <button class="btn-primary" id="btnSubmitReview">제출하기</button>
    </div>
  </div>

  <!-- 완료 모달 -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal-box" style="text-align:center;">
      <div style="font-size:56px;margin-bottom:16px;">🙏</div>
      <div class="modal-title">감사합니다!</div>
      <div class="modal-msg">소중한 정보가 등록되었습니다.</div>
    </div>
  </div>

  <script src="review.js"></script>
</body>
</html>
