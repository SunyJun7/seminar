<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세미나 후기 | SmartGate</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .review-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 480px;
      margin: 40px auto;
    }
    .review-card h2 {
      color: #1a237e;
      font-size: 20px;
      margin-bottom: 6px;
    }
    .review-card .subtitle {
      color: #888;
      font-size: 13px;
      margin-bottom: 28px;
    }

    /* 단계 표시 */
    .step-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e0e0e0;
      color: #999;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .step-dot.active { background: #1a237e; color: #fff; }
    .step-dot.done   { background: #00aac8; color: #fff; }
    .step-line {
      flex: 1;
      height: 2px;
      background: #e0e0e0;
    }
    .step-line.done { background: #00aac8; }

    /* 별점 */
    .stars {
      display: flex;
      flex-direction: row-reverse;
      gap: 4px;
      margin-top: 6px;
    }
    .stars input[type="radio"] { display: none; }
    .stars label {
      font-size: 40px;
      color: #ddd;
      cursor: pointer;
      transition: color 0.15s;
    }
    .stars input[type="radio"]:checked ~ label,
    .stars label:hover,
    .stars label:hover ~ label { color: #f5a623; }

    textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      resize: vertical;
      box-sizing: border-box;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #1a237e; }

    .rating-error { color: #e53935; font-size: 13px; margin-top: 4px; display: none; }

    .step { display: none; }
    .step.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="review-card">

      <!-- 단계 표시 -->
      <div class="step-indicator">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-line" id="line1"></div>
        <div class="step-dot" id="dot2">2</div>
      </div>

      <!-- STEP 1: 개인정보 -->
      <div class="step active" id="step1">
        <h2>참석자 정보 입력</h2>
        <p class="subtitle">설문 전 아래 정보를 입력해 주세요. <span style="color:#e53935;">*</span> 는 필수 항목입니다.</p>

        <div class="form-group">
          <label for="reviewName">이름 <span class="required">*</span></label>
          <input type="text" id="reviewName" placeholder="홍길동" />
        </div>
        <div class="form-group">
          <label for="reviewCompany">회사명 <span class="required">*</span></label>
          <input type="text" id="reviewCompany" placeholder="(주)스마트게이트" />
        </div>
        <div class="form-group">
          <label for="reviewDept">부서 <span class="required">*</span></label>
          <input type="text" id="reviewDept" placeholder="전략기획팀" />
        </div>
        <div class="form-group">
          <label for="reviewPhone">연락처 <span class="required">*</span></label>
          <input type="tel" id="reviewPhone" placeholder="01012345678" />
        </div>
        <div class="form-group">
          <label for="reviewEmail">이메일 <span class="required">*</span></label>
          <input type="email" id="reviewEmail" placeholder="example@company.com" />
        </div>

        <button class="btn-primary" id="btnNext">다음</button>
      </div>

      <!-- STEP 2: 설문 -->
      <div class="step" id="step2">
        <h2>세미나 후기 작성</h2>
        <p class="subtitle">소중한 의견을 남겨주시면 더 나은 행사 준비에 활용됩니다.</p>

        <div class="form-group">
          <label>별점 <span style="color:#e53935;">*</span></label>
          <div class="stars" id="starGroup">
            <input type="radio" name="rating" id="s5" value="5"><label for="s5">★</label>
            <input type="radio" name="rating" id="s4" value="4"><label for="s4">★</label>
            <input type="radio" name="rating" id="s3" value="3"><label for="s3">★</label>
            <input type="radio" name="rating" id="s2" value="2"><label for="s2">★</label>
            <input type="radio" name="rating" id="s1" value="1"><label for="s1">★</label>
          </div>
          <div class="rating-error" id="ratingError">별점을 선택해 주세요.</div>
        </div>

        <div class="form-group">
          <label for="reviewContent">후기 <span style="color:#e53935;">*</span></label>
          <textarea id="reviewContent" placeholder="세미나에 대한 솔직한 의견을 남겨주세요."></textarea>
        </div>

        <button class="btn-primary" id="btnSubmitReview">후기 제출</button>
      </div>

    </div>
  </div>

  <script src="review.js"></script>
</body>
</html>
