<!DOCTYPE html>
<html lang="ko" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>실시간 AI 오케스트레이션 세미나 초대</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#e8f7fa; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100;">

<!-- ============================================================
     서버 BASE URL — 여기만 바꾸면 모든 이미지 경로가 자동 변경됨
     ============================================================ -->

<!-- 전체 배경 wrapper -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#e8f7fa;">
  <tr>
    <td align="center" style="padding:30px 16px;">

      <!-- 메인 컨테이너 (최대 640px) -->
      <table role="presentation" width="640" cellpadding="0" cellspacing="0" border="0" style="max-width:640px; width:100%; background-color:#ffffff; border-radius:8px; overflow:hidden;">

        <!-- ====== 포스터 이미지 영역 ====== -->
        <tr>
          <td align="center" style="padding:0; line-height:0;">
            <!--
              포스터 이미지를 서버에 업로드하고 아래 src 경로를 수정하세요.
              권장: /images/email-poster.png (또는 .jpg)
              이미지 권장 폭: 1280px (레티나 대응, 이메일에선 640px로 표시됨)
            -->
            <a href="https://smartgate-vantiq-seminar.up.railway.app/register.html" target="_blank" style="display:block; text-decoration:none;">
              <img
                src="https://smartgate-vantiq-seminar.up.railway.app/images/final.png"
                alt="실시간 AI 오케스트레이션 Vantiq x 스마트게이트가 제시하는 AX의 미래 — 2026.04.28(TUE) 13:30~17:10, 양재 엘타워 멜론홀"
                width="640"
                style="display:block; width:100%; max-width:640px; height:auto; border:0; outline:none;"
              />
            </a>
          </td>
        </tr>

        <!-- ====== 사전등록 버튼 영역 ====== -->
        <tr>
          <td align="center" style="padding:32px 20px 28px 20px; background-color:#ffffff;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td align="center" style="background-color:#0b1840; border-radius:10px;">
                  <a href="https://smartgate-vantiq-seminar.up.railway.app/register.html"
                     target="_blank"
                     style="display:inline-block; padding:16px 52px; color:#ffffff; font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif; font-size:18px; font-weight:800; text-decoration:none; letter-spacing:3px; line-height:1;">
                    사전 등록
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ====== 구분선 ====== -->
        <tr>
          <td style="padding:0 28px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="border-top:1px solid #e0e0e0; font-size:0; line-height:0;">&nbsp;</td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ====== 하단 로고 + 문의처 ====== -->
        <tr>
          <td style="padding:20px 28px 28px 28px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <!-- 로고 영역 -->
                <td align="left" valign="middle" style="width:60%;">
                  <img
                    src="https://smartgate-vantiq-seminar.up.railway.app/images/logo-smartgate.png"
                    alt="SMARTGATE"
                    height="26"
                    style="display:inline-block; height:26px; width:auto; border:0; outline:none; vertical-align:middle;"
                  />
                  &nbsp;&nbsp;&nbsp;
                  <img
                    src="https://smartgate-vantiq-seminar.up.railway.app/images/logo-vantiq.png"
                    alt="VANTIQ"
                    height="26"
                    style="display:inline-block; height:26px; width:auto; border:0; outline:none; vertical-align:middle;"
                  />
                </td>
                <!-- 문의처 -->
                <td align="right" valign="middle" style="width:40%; font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif; font-size:11px; color:#999999; line-height:1.6;">
                  <span style="display:block; color:#777777; font-weight:700; letter-spacing:2px; margin-bottom:2px;">문 의 처</span>
                  hightech_sales@smartgate.co.kr
                </td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
      <!-- /메인 컨테이너 -->

      <!-- 하단 안내 문구 (선택) -->
      <table role="presentation" width="640" cellpadding="0" cellspacing="0" border="0" style="max-width:640px; width:100%;">
        <tr>
          <td align="center" style="padding:20px 16px 10px 16px; font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif; font-size:11px; color:#aaaaaa; line-height:1.6;">
            본 메일은 세미나 안내를 위해 발송되었습니다.<br>
            문의 : hightech_sales@smartgate.co.kr
          </td>
        </tr>
      </table>

    </td>
  </tr>
</table>

</body>
</html>
