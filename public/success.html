<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✏️ [수정] 브라우저 탭 제목 -->
  <title>신청 완료 | AI 기반 실시간 데이터 플랫폼 세미나</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="result-card success">

      <!-- ✏️ [수정] 완료 아이콘 이모지 -->
      <div class="result-icon">✅</div>

      <!-- ✏️ [수정] 완료 페이지 제목 -->
      <h2>신청이 완료되었습니다!</h2>

      <!-- ✏️ [수정] 완료 안내 문구 (두 줄) -->

      <p>4월 28일 행사장에서 뵙겠습니다.</p>

      <!-- ✏️ [수정] 완료 후 표시할 행사 일시·장소 요약 -->
      <div style="margin-top:24px; padding:16px; background:#f0f2ff; border-radius:10px; font-size:14px; color:#1a237e;">
        📅 2026년 4월 28일 (화) 14:00 ~ 16:30<br>
        📍 양재 엘타워 옆 스포타임 5층
      </div>

      <div class="result-actions">
        <!-- ✏️ [수정] 버튼 텍스트 -->
        <a href="index.html" class="btn-secondary">메인으로</a>
      </div>

    </div>
  </div>

</html>
